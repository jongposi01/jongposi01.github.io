<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>공지사항</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 16px;
    line-height: 1.6;
}

h1 {
    font-size: 20px;
}

.section {
    margin-top: 20px;
}

.badge {
    display: inline-block;
    background: #6A4FB3;
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 10px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.item {
    background: #f5f5f5;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 14px;
}
</style>

</head>

<body>

<h1>📢 공지사항</h1>

<div class="section">
    <div class="badge">안내</div>
    <p>
        현재 서비스는 아래 지역의 의류수거함 정보를 제공합니다.<br/>
        지속적으로 데이터를 확대할 예정입니다.
    </p>
</div>

<div class="section">
    <h3>📍 검색 가능 지역</h3>

    <div class="grid">
        <div class="item">동작구</div>
        <div class="item">은평구</div>
        <div class="item">강북구</div>
        <div class="item">강동구</div>
        <div class="item">강남구</div>
        <div class="item">강서구</div>
        <div class="item">금천구</div>
        <div class="item">관악구</div>
        <div class="item">광진구</div>
        <div class="item">종로구</div>
        <div class="item">중랑구</div>
        <div class="item">마포구</div>
        <div class="item">서대문구</div>
        <div class="item">성북구</div>
        <div class="item">성동구</div>
        <div class="item">송파구</div>
        <div class="item">양천구</div>
        <div class="item">영등포구</div>
        <div class="item">용산구</div>
    </div>
</div>

<div class="section">
    <h3>📌 안내</h3>
    <p>
        위치 권한을 허용하면 현재 위치 기준으로<br/>
        가까운 의류수거함을 자동으로 확인할 수 있습니다.
    </p>
</div>

</body>
</html>
